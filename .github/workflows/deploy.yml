name: Deploy to VPS

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: "Demo - Main"
      ENVIRONMENT_URL: "https://openres.to"

    steps:
      - name: Create GitHub deployment record
        id: deployment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "==> Creating GitHub deployment for environment '$ENVIRONMENT'..."
          BODY=$(jq -n \
            --arg ref "$GITHUB_SHA" \
            --arg env "$ENVIRONMENT" \
            --arg desc "Deploy to VPS via SSH" \
            '{ref: $ref, environment: $env, description: $desc, auto_merge: false, required_contexts: []}')

          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$BODY" \
            "https://api.github.com/repos/${{ github.repository }}/deployments")

          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" = "null" ]; then
            echo "Failed to create deployment record — continuing without tracking."
            exit 0
          fi
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "Created deployment #$DEPLOYMENT_ID."

          echo "==> Marking deployment as in_progress..."
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$(jq -n --arg url "$ENVIRONMENT_URL" \
              '{state: "in_progress", environment_url: $url, description: "Deployment in progress"}')" \
            "https://api.github.com/repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            trap 'echo "==> Error — dumping container logs:"; docker compose -f docker-compose.vps.yml logs --tail=80' ERR

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building and starting containers..."
            docker compose -f docker-compose.vps.yml up -d --build --remove-orphans

            echo "==> Waiting for backend to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker compose -f docker-compose.vps.yml exec -T backend \
                curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy after $i attempt(s)."
                break
              fi
              if [ "$i" = "30" ]; then
                echo "Health check failed after 150s — showing logs:"
                docker compose -f docker-compose.vps.yml logs --tail=80
                exit 1
              fi
              echo "Attempt $i/30: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done

            echo "==> Pruning unused images..."
            docker image prune -f

            echo "==> Deployment complete."

      - name: Update deployment status (success)
        if: ${{ success() && steps.deployment.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DEPLOYMENT_ID="${{ steps.deployment.outputs.deployment_id }}"
          echo "==> Marking deployment #$DEPLOYMENT_ID as successful..."
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$(jq -n --arg url "$ENVIRONMENT_URL" \
              '{state: "success", environment_url: $url, description: "Deployment succeeded"}')" \
            "https://api.github.com/repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses"
          echo "==> Live site: $ENVIRONMENT_URL"

      - name: Update deployment status (failure)
        if: ${{ failure() && steps.deployment.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DEPLOYMENT_ID="${{ steps.deployment.outputs.deployment_id }}"
          echo "==> Marking deployment #$DEPLOYMENT_ID as failed..."
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{state: "failure", description: "Deployment failed"}' \
            "https://api.github.com/repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses"
