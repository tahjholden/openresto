name: Deploy to VPS

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            trap 'echo "==> Error — dumping container logs:"; docker compose -f docker-compose.vps.yml logs --tail=80' ERR

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building and starting containers..."
            docker compose -f docker-compose.vps.yml up -d --build --remove-orphans

            echo "==> Waiting for backend to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker compose -f docker-compose.vps.yml exec -T backend \
                curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy after $i attempt(s)."
                break
              fi
              if [ "$i" = "30" ]; then
                echo "Health check failed after 150s — showing logs:"
                docker compose -f docker-compose.vps.yml logs --tail=80
                exit 1
              fi
              echo "Attempt $i/30: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done

            echo "==> Pruning unused images..."
            docker image prune -f

            echo "==> Deployment complete."
