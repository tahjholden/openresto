volumes:
  media_data:

services:
  backend:
    build:
      context: ./OpenRestoApi
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - PORT=8080
      - CORS_ORIGINS=https://${DOMAIN_NAME}
      - JWT_KEY=${JWT_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CONNECTION_STRING=${CONNECTION_STRING:-Data Source=/data/openresto.db}
      - DATA_PROTECTION_KEYS_PATH=/data/dp-keys
      - Vapid__PublicKey=${VAPID_PUBLIC_KEY}
      - Vapid__PrivateKey=${VAPID_PRIVATE_KEY}
      - Vapid__Subject=${VAPID_SUBJECT}
    volumes:
      - ./data:/data
      - media_data:/app/wwwroot/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  frontend:
    build:
      context: ./openresto-frontend
      dockerfile: Dockerfile
      args:
        - EXPO_PUBLIC_API_URL=/api
    environment:
      - EXPO_PUBLIC_API_URL=/api
      - PORT=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  reverse-proxy:
    build:
      context: ./nginx-vps
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - BACKEND_HOST=backend
      - BACKEND_PORT=8080
      - FRONTEND_HOST=frontend
      - FRONTEND_PORT=8081
      - SSL_CERT_PATH=/etc/nginx/ssl/server.crt
      - SSL_KEY_PATH=/etc/nginx/ssl/server.key
    volumes:
      - ${HOST_SSL_CERT_PATH}:/etc/nginx/ssl/server.crt:ro
      - ${HOST_SSL_KEY_PATH}:/etc/nginx/ssl/server.key:ro
      - media_data:/usr/share/nginx/html/media:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: always
