events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    server {
        listen 80;
        
        # Max body size
        client_max_body_size 10M;

        # Shared security headers logic (simplified for standalone file)
        set $proxy_target "ReverseProxy";
        add_header X-Content-Type-Options           "nosniff" always;
        add_header X-Frame-Options                  "DENY" always;
        add_header X-XSS-Protection                 "1; mode=block" always;
        add_header Referrer-Policy                  "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security        "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy               "camera=(), microphone=(), geolocation=()" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Cross-Origin-Opener-Policy       "same-origin" always;
        add_header Cross-Origin-Resource-Policy     "same-origin" always;
        add_header Content-Security-Policy          "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: *; font-src 'self' data:; connect-src 'self' *; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Media — static file serving from shared volume
        location /media/ {
            alias /usr/share/nginx/html/media/;
            sendfile on;
            tcp_nopush on;
            expires 30d;
            add_header Cache-Control "public, no-transform" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Proactive protection
        location ~ /\.(?!well-known).* {
            deny all;
            access_log off;
            log_not_found off;
        }

        # API
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # Frontend
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://frontend:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # Health
        location /health {
            access_log off;
            return 200 "OK";
        }
    }
}
