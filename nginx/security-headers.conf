# OWASP ZAP & Security Best Practices Headers
add_header X-Content-Type-Options           "nosniff" always;
add_header X-Frame-Options                  "DENY" always;
add_header X-XSS-Protection                 "1; mode=block" always;
add_header Referrer-Policy                  "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security        "max-age=31536000; includeSubDomains" always;
add_header Permissions-Policy               "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;
add_header Cross-Origin-Opener-Policy       "same-origin" always;
add_header Cross-Origin-Resource-Policy     "same-origin" always;

# Content Security Policy (CSP)
# default-src 'self': Only allow content from your own domain by default.
# script-src 'self' 'unsafe-inline' 'unsafe-eval': Needed for many React/Expo apps.
# style-src 'self' 'unsafe-inline': Needed for CSS-in-JS.
# img-src 'self' data: *: Allows images from anywhere (common for restaurant menus).
# connect-src 'self' *: Allows API calls to any domain (flexible for different environments).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: *; font-src 'self' data:; connect-src 'self' *; frame-src https://www.openstreetmap.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

# Disclosure Prevention
proxy_hide_header                    X-Powered-By;
proxy_hide_header                    Server;
